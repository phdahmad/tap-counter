<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5C0A2E"/>
      <stop offset="100%" stop-color="#3d0820"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Soft decorations -->
  <circle cx="1080" cy="60" r="200" fill="#F5F0E8" opacity="0.04"/>
  <circle cx="120" cy="580" r="160" fill="#F5F0E8" opacity="0.04"/>

  <!-- Left: big "1" -->
  <text x="240" y="370" font-family="Georgia, 'Times New Roman', serif" font-weight="300"
        font-size="320" fill="#F5F0E8" text-anchor="middle">1</text>

  <!-- Divider -->
  <line x1="500" y1="200" x2="500" y2="430" stroke="#F5F0E8" stroke-width="1" opacity="0.35"/>

  <!-- Right column: tighter layout -->
  <text x="1130" y="265" font-family="'Amiri','Noto Naskh Arabic','Traditional Arabic',serif"
        font-weight="400" font-size="140" fill="#F5F0E8" text-anchor="end" direction="rtl">عدّاد</text>

  <text x="1130" y="335" font-family="'Amiri','Noto Naskh Arabic','Traditional Arabic',serif"
        font-weight="400" font-size="38" fill="#F5F0E8" text-anchor="end" direction="rtl">عدّاد رقمي بالعربية</text>

  <text x="1130" y="395" font-family="'Amiri','Noto Naskh Arabic','Traditional Arabic',serif"
        font-weight="400" font-size="28" fill="#c9ada7" text-anchor="end" direction="rtl">بسيط · أنيق · مجاني</text>

  <!-- Bottom band with URL -->
  <rect x="0" y="540" width="1200" height="90" fill="#000" opacity="0.20"/>
  <text x="600" y="590" font-family="'Inter','Helvetica',sans-serif" font-weight="500"
        font-size="28" fill="#F5F0E8" text-anchor="middle" letter-spacing="2">phdahmad.github.io/tap-counter</text>
</svg>